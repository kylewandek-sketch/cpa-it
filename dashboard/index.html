<title>CPA IT · Ticket Dashboard</title>
<style>
  :root {
    color-scheme: light dark;
    --navy:#061E44; --blue:#0E1DA2; --blue-d:#0a1580;
    --page:#eef1f6; --card:#fff; --ink:#1a2233; --muted:#5a6577; --line:#dfe4ee;
    --green:#0a8f4a; --amber:#c47d00; --red:#d13438; --gray:#6b7280;
  }
  @media (prefers-color-scheme: dark) {
    :root { --page:#0f1420; --card:#171d2b; --ink:#e8ecf4; --muted:#9aa6bd; --line:#2a3244; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--page); color: var(--ink); }
  .topbar { background: var(--navy); color:#fff; padding:12px 20px; display:flex; align-items:center; gap:14px;
            box-shadow:0 2px 10px rgba(0,0,0,.18); }
  .topbar img.logo { height:42px; }
  .topbar .t1 { font-size:17px; font-weight:700; }
  .topbar .t2 { font-size:12px; opacity:.8; }
  .topbar .spacer { flex:1; }
  .topbar button { background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25);
                   padding:7px 12px; border-radius:8px; cursor:pointer; font-size:13px; }
  .topbar button:hover { background:rgba(255,255,255,.22); }
  .accent { height:4px; background:linear-gradient(90deg,var(--blue),#3b6fd6); }
  .page { max-width:1200px; margin:0 auto; padding:16px; }

  .stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 16px; min-width:120px; }
  .stat .n { font-size:24px; font-weight:700; }
  .stat .l { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }

  .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .controls input[type=search], .controls select {
    padding:9px 11px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-size:14px; }
  .controls input[type=search] { min-width:220px; flex:1; }
  .controls .grow { flex:1; }
  button.btn { padding:9px 14px; border-radius:9px; border:1px solid var(--line); background:var(--card);
               color:var(--ink); cursor:pointer; font-size:14px; }
  button.btn:hover { background:rgba(14,29,162,.06); }
  button.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
  button.primary:hover { background:var(--blue-d); }

  .tablewrap { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th, td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top; }
  th { position:sticky; top:0; background:var(--card); font-size:11.5px; text-transform:uppercase;
       letter-spacing:.04em; color:var(--muted); cursor:pointer; white-space:nowrap; user-select:none; }
  th .arrow { opacity:.5; font-size:10px; }
  td.sn { font-family:ui-monospace,Menlo,monospace; font-weight:600; }
  tr.resolved { opacity:.55; }
  .badge { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; }
  .u-High { background:rgba(209,52,56,.14); color:var(--red); }
  .u-Medium { background:rgba(196,125,0,.16); color:var(--amber); }
  .u-Low { background:rgba(107,114,128,.16); color:var(--gray); }
  select.status { padding:5px 8px; border-radius:7px; border:1px solid var(--line); background:var(--card); color:var(--ink); font-size:12.5px; }
  input.notes, input.edit { width:100%; min-width:90px; padding:5px 7px; border-radius:7px; border:1px solid var(--line);
                background:var(--card); color:var(--ink); font-size:12.5px; }
  td.age-red { color:var(--red); font-weight:700; }
  td.age-amber { color:var(--amber); font-weight:700; }
  .desc { max-width:260px; color:var(--muted); }
  .desc .more { color:var(--blue); cursor:pointer; }
  td.actions button { background:none; border:none; color:var(--red); cursor:pointer; font-size:16px; }
  .muted { color:var(--muted); }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff;
           padding:10px 16px; border-radius:10px; font-size:14px; opacity:0; transition:opacity .15s; pointer-events:none; z-index:20; }
  .toast.show { opacity:1; }
  .empty { padding:40px; text-align:center; color:var(--muted); }

  /* Sign-in gate */
  .gate { max-width:420px; margin:60px auto; background:var(--card); border:1px solid var(--line);
          border-radius:14px; padding:26px; text-align:center; }
  .gate h2 { margin:6px 0 4px; }
  .gate p { color:var(--muted); font-size:13.5px; margin:0 0 16px; }
  .gate input { width:100%; padding:11px; border-radius:9px; border:1px solid var(--line); background:var(--card);
                color:var(--ink); font-size:15px; margin-bottom:12px; }
  .hidden { display:none !important; }

  /* Tabs */
  .tabs { display:flex; gap:6px; margin-bottom:14px; border-bottom:1px solid var(--line); }
  .tab { padding:9px 18px; border:none; background:transparent; color:var(--muted); cursor:pointer;
         font-size:14px; font-weight:600; border-bottom:3px solid transparent; margin-bottom:-1px; }
  .tab.active { color:var(--ink); border-bottom-color:var(--blue); }

  /* Reports */
  .rnote { font-size:12px; color:var(--muted); margin:0 2px 12px; }
  .reports { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:760px){ .reports { grid-template-columns:1fr; } }
  .chart-card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .chart-card h3 { margin:0 0 14px; font-size:14px; }
  .bar-row { display:flex; align-items:center; gap:10px; margin:9px 0; font-size:13px; }
  .bar-row .lbl { width:118px; flex:none; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar-track { flex:1; background:rgba(127,127,127,.12); border-radius:6px; height:18px; }
  .bar-fill { height:100%; border-radius:6px; min-width:3px; }
  .bar-row .val { width:28px; flex:none; font-weight:700; }
  .vbars { display:flex; align-items:flex-end; gap:5px; height:150px; }
  .vcol { flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%; }
  .vnum { font-size:10px; color:var(--muted); margin-bottom:2px; }
  .vbar { width:72%; border-radius:4px 4px 0 0; min-height:2px; background:#2f6fe0; }
  .vcap { font-size:10px; color:var(--muted); margin-top:5px; white-space:nowrap; }
</style>
</head>

<script>
// ==== CONFIG ====
var ENDPOINT = 'https://script.google.com/macros/s/AKfycbzryIshRIh12BxKZLgSP5RcsSotwlbwb_CNzbZK0sy5G_s3RxPWPoWJOxCHvmnlP5ldYQ/exec';

var TOKEN_KEY = 'cpaTicketToken';
var token = localStorage.getItem(TOKEN_KEY) || '';
var tickets = [];
var sortKey = 'urgency', sortDir = -1;   // default: urgency High→Low
var URANK = { High: 3, Medium: 2, Low: 1, '': 0 };

var COLS = [
  { k: 'ticketNo', label: '#' },
  { k: 'urgency', label: 'Urgency' },
  { k: 'sn', label: 'S/N' },
  { k: 'issue', label: 'Issue' },
  { k: 'age', label: 'Age' },
  { k: 'teacherEmail', label: 'Teacher' },
  { k: 'room', label: 'Room' },
  { k: 'timestamp', label: 'Submitted' },
  { k: 'status', label: 'Status' },
  { k: 'assignedTo', label: 'Assigned' },
  { k: 'studentAtFault', label: 'Student at fault' },
  { k: 'notes', label: 'Notes' },
  { k: 'photoUrl', label: 'Photo' },
  { k: 'description', label: 'Description' }
];

function ageDays(t) {
  if (!t.timestamp) return 0;
  var end = (t.status === 'Resolved' && t.resolvedAt) ? new Date(t.resolvedAt) : new Date();
  return Math.floor((end - new Date(t.timestamp)) / 86400000);
}
function ageInfo(t) {
  var d = ageDays(t);
  if (t.status === 'Resolved') return { cls: 'muted', text: (d >= 0 ? d + 'd' : '') };
  return { cls: d >= 7 ? 'age-red' : (d >= 3 ? 'age-amber' : 'muted'), text: d + 'd' };
}

// ---- JSONP (avoids CORS with Apps Script) ----
function jsonp(params) {
  return new Promise(function (resolve, reject) {
    var cb = 'cb_' + Math.random().toString(36).slice(2);
    var s = document.createElement('script');
    var timer = setTimeout(function () { cleanup(); reject(new Error('Request timed out')); }, 20000);
    function cleanup() { clearTimeout(timer); delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = function (data) { cleanup(); resolve(data); };
    s.onerror = function () { cleanup(); reject(new Error('Network error')); };
    var qs = Object.keys(params).map(function (k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    s.src = ENDPOINT + '?' + qs + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 1800);
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
  });
}

// ---- Auth ----
function showApp(show) {
  document.getElementById('gate').classList.toggle('hidden', show);
  document.getElementById('app').classList.toggle('hidden', !show);
  document.getElementById('refreshbtn').classList.toggle('hidden', !show);
  document.getElementById('signoutbtn').classList.toggle('hidden', !show);
}
document.getElementById('signinbtn').onclick = function () {
  var v = document.getElementById('tokenInput').value.trim();
  if (!v) return;
  token = v;
  load(true);
};
document.getElementById('signoutbtn').onclick = function () {
  localStorage.removeItem(TOKEN_KEY); token = ''; tickets = [];
  stopAuto();
  showApp(false);
};
document.getElementById('refreshbtn').onclick = function () { load(false); };

// ---- Auto-refresh (every 15 minutes) ----
var AUTO_MS = 15 * 60 * 1000;
var autoTimer = null;
function startAuto() { stopAuto(); autoTimer = setInterval(autoRefresh, AUTO_MS); }
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
function autoRefresh() {
  // Don't interrupt an in-progress edit (a focused status/notes field).
  var ae = document.activeElement;
  if (ae && (ae.classList.contains('notes') || ae.classList.contains('status'))) return;
  load(false, { auto: true });
}

// ---- Load ----
function load(fromGate, opts) {
  opts = opts || {};
  var gatemsg = document.getElementById('gatemsg');
  gatemsg.textContent = '';
  jsonp({ action: 'list', token: token }).then(function (res) {
    if (!res || res.ok === false) {
      if (res && res.error === 'unauthorized') {
        gatemsg.textContent = 'Wrong token.'; showApp(false); stopAuto(); return;
      }
      throw new Error((res && res.error) || 'Failed to load');
    }
    localStorage.setItem(TOKEN_KEY, token);
    tickets = res.rows || [];
    statsData = null;   // invalidate lifetime stats so Reports refetches fresh
    showApp(true);
    render();
    startAuto();   // (re)start the 15-min clock from the latest load
    if (!fromGate) toast((opts.auto ? 'Auto-refreshed — ' : 'Refreshed — ') + tickets.length + ' tickets');
  }).catch(function (err) {
    if (fromGate) gatemsg.textContent = err.message;
    else toast('Error: ' + err.message);
  });
}

// ---- Render ----
function currentView() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  var fs = document.getElementById('fStatus').value;
  var fu = document.getElementById('fUrgency').value;
  var hideRes = document.getElementById('hideResolved').checked;
  var list = tickets.filter(function (t) {
    if (fs && (t.status || 'New') !== fs) return false;
    if (fu && t.urgency !== fu) return false;
    if (hideRes && (t.status || 'New') === 'Resolved') return false;
    if (q) {
      var hay = [t.sn, t.teacherEmail, t.teacherName, t.issue, t.description, t.notes, t.room].join(' ').toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });
  list.sort(function (a, b) {
    var av, bv;
    if (sortKey === 'urgency') { av = URANK[a.urgency] || 0; bv = URANK[b.urgency] || 0; }
    else if (sortKey === 'timestamp') { av = a.timestamp || ''; bv = b.timestamp || ''; }
    else if (sortKey === 'age') { av = ageDays(a); bv = ageDays(b); }
    else if (sortKey === 'ticketNo') { av = Number(a.ticketNo) || 0; bv = Number(b.ticketNo) || 0; }
    else { av = String(a[sortKey] || '').toLowerCase(); bv = String(b[sortKey] || '').toLowerCase(); }
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return (b.timestamp || '').localeCompare(a.timestamp || '');   // tiebreak: newest first
  });
  return list;
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function renderStats() {
  var open = tickets.filter(function (t) { return (t.status || 'New') !== 'Resolved'; });
  var highOpen = open.filter(function (t) { return t.urgency === 'High'; });
  var newCount = tickets.filter(function (t) { return (t.status || 'New') === 'New'; });
  var overdue = open.filter(function (t) { return ageDays(t) >= 7; });
  var cards = [
    ['Total', tickets.length], ['Open', open.length],
    ['High & open', highOpen.length], ['New', newCount.length],
    ['Overdue >7d', overdue.length]
  ];
  document.getElementById('stats').innerHTML = cards.map(function (c) {
    return '<div class="stat"><div class="n">' + c[1] + '</div><div class="l">' + c[0] + '</div></div>';
  }).join('');
}

function renderHead() {
  document.getElementById('head').innerHTML = COLS.map(function (c) {
    if (c.k === '_act') return '<th></th>';
    var arrow = sortKey === c.k ? ('<span class="arrow">' + (sortDir > 0 ? '▲' : '▼') + '</span>') : '';
    return '<th data-k="' + c.k + '">' + c.label + ' ' + arrow + '</th>';
  }).join('');
  Array.prototype.forEach.call(document.querySelectorAll('#head th[data-k]'), function (th) {
    th.onclick = function () {
      var k = th.getAttribute('data-k');
      if (sortKey === k) sortDir = -sortDir;
      else { sortKey = k; sortDir = (k === 'urgency' || k === 'timestamp') ? -1 : 1; }
      render();
    };
  });
}

var STATUSES = ['New', 'In Progress', 'Waiting', 'Resolved'];
function render() {
  renderStats(); renderHead();
  var list = currentView();
  var tb = document.getElementById('rows');
  document.getElementById('empty').classList.toggle('hidden', list.length > 0);
  tb.innerHTML = list.map(function (t) {
    var statusOpts = STATUSES.map(function (s) {
      return '<option' + (s === (t.status || 'New') ? ' selected' : '') + '>' + s + '</option>';
    }).join('');
    var u = t.urgency || '';
    var ai = ageInfo(t);
    var descShort = esc((t.description || '').slice(0, 90)) + ((t.description || '').length > 90 ? '…' : '');
    return '<tr class="' + ((t.status || 'New') === 'Resolved' ? 'resolved' : '') + '" data-row="' + t.row + '">' +
      '<td class="muted">' + esc(t.ticketNo) + '</td>' +
      '<td><span class="badge u-' + esc(u) + '">' + esc(u || '—') + '</span></td>' +
      '<td class="sn">' + esc(t.sn) + '</td>' +
      '<td>' + esc(t.issue) + '</td>' +
      '<td class="' + ai.cls + '">' + ai.text + '</td>' +
      '<td>' + esc(t.teacherEmail || t.teacherName) + '</td>' +
      '<td>' + esc(t.room) + '</td>' +
      '<td class="muted">' + esc(fmtDate(t.timestamp)) + '</td>' +
      '<td><select class="status" data-row="' + t.row + '">' + statusOpts + '</select></td>' +
      '<td><input class="edit" data-field="assignedTo" data-row="' + t.row + '" value="' + esc(t.assignedTo) + '" placeholder="—"></td>' +
      '<td><input class="edit" data-field="studentAtFault" data-row="' + t.row + '" value="' + esc(t.studentAtFault) + '" placeholder="—"></td>' +
      '<td><input class="notes" data-row="' + t.row + '" value="' + esc(t.notes) + '" placeholder="Add note…"></td>' +
      '<td>' + (t.photoUrl ? '<a href="' + esc(t.photoUrl) + '" target="_blank" rel="noopener" title="Open photo">📷</a>' : '') + '</td>' +
      '<td class="desc" title="' + esc(t.description) + '">' + descShort + '</td>' +
      '</tr>';
  }).join('');

  Array.prototype.forEach.call(tb.querySelectorAll('select.status'), function (sel) {
    sel.onchange = function () { updateField(sel.getAttribute('data-row'), { status: sel.value }); };
  });
  Array.prototype.forEach.call(tb.querySelectorAll('input.notes'), function (inp) {
    inp.onchange = function () { updateField(inp.getAttribute('data-row'), { notes: inp.value }); };
  });
  Array.prototype.forEach.call(tb.querySelectorAll('input.edit'), function (inp) {
    inp.onchange = function () {
      var f = {}; f[inp.getAttribute('data-field')] = inp.value;
      updateField(inp.getAttribute('data-row'), f);
    };
  });
  if (activeTab === 'reports') renderReports();
}

function localRow(row) { return tickets.filter(function (t) { return String(t.row) === String(row); })[0]; }

function updateField(row, fields) {
  var params = { action: 'update', token: token, row: row };
  Object.keys(fields).forEach(function (k) { params[k] = fields[k]; });
  var t = localRow(row);
  if (t) Object.keys(fields).forEach(function (k) { t[k] = fields[k]; });   // optimistic
  renderStats();
  jsonp(params).then(function (res) {
    if (!res || res.ok === false) throw new Error((res && res.error) || 'save failed');
    toast('Saved');
    if (fields.status) render();   // may change resolved styling / filters
  }).catch(function (err) { toast('Save failed: ' + err.message + ' — refresh'); });
}

// ---- Reports (charts from the currently loaded tickets) ----
var activeTab = 'tickets';
document.getElementById('tabTickets').onclick = function () { setTab('tickets'); };
document.getElementById('tabReports').onclick = function () { setTab('reports'); };
function setTab(t) {
  activeTab = t;
  document.getElementById('tabTickets').classList.toggle('active', t === 'tickets');
  document.getElementById('tabReports').classList.toggle('active', t === 'reports');
  document.getElementById('ticketsView').classList.toggle('hidden', t !== 'tickets');
  document.getElementById('reportsView').classList.toggle('hidden', t !== 'reports');
  if (t === 'reports') renderReports();
}

function barChart(items) {
  var max = Math.max.apply(null, items.map(function (i) { return i.value; }).concat([1]));
  var rows = items.map(function (i) {
    var pct = Math.round(i.value / max * 100);
    return '<div class="bar-row" title="' + esc(i.label) + ': ' + i.value + '">' +
      '<div class="lbl">' + esc(i.label) + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (i.color || '#2f6fe0') + '"></div></div>' +
      '<div class="val">' + i.value + '</div></div>';
  }).join('');
  return rows || '<div class="rnote">No data.</div>';
}

function dayTrend() {
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var days = [];
  for (var k = 13; k >= 0; k--) { var d = new Date(today); d.setDate(d.getDate() - k); days.push({ d: d, n: 0 }); }
  tickets.forEach(function (t) {
    if (!t.timestamp) return;
    var dt = new Date(t.timestamp); dt.setHours(0, 0, 0, 0);
    for (var j = 0; j < days.length; j++) { if (days[j].d.getTime() === dt.getTime()) { days[j].n++; break; } }
  });
  var max = Math.max.apply(null, days.map(function (x) { return x.n; }).concat([1]));
  return '<div class="vbars">' + days.map(function (x) {
    var h = Math.round(x.n / max * 100);
    var lbl = (x.d.getMonth() + 1) + '/' + x.d.getDate();
    return '<div class="vcol" title="' + lbl + ': ' + x.n + '">' +
      (x.n ? '<div class="vnum">' + x.n + '</div>' : '') +
      '<div class="vbar" style="height:' + h + '%"></div>' +
      '<div class="vcap">' + lbl + '</div></div>';
  }).join('') + '</div>';
}

function renderReports() {
  var uColor = { High: '#d13438', Medium: '#c47d00', Low: '#6b7280' };
  var byUrg = ['High', 'Medium', 'Low'].map(function (u) {
    return { label: u, color: uColor[u], value: tickets.filter(function (t) { return t.urgency === u; }).length };
  });
  var sColor = { 'New': '#0E1DA2', 'In Progress': '#c47d00', 'Waiting': '#6b7280', 'Resolved': '#0a8f4a' };
  var byStatus = STATUSES.map(function (s) {
    return { label: s, color: sColor[s], value: tickets.filter(function (t) { return (t.status || 'New') === s; }).length };
  });
  var im = {};
  tickets.forEach(function (t) { var k = t.issue || '(none)'; im[k] = (im[k] || 0) + 1; });
  var byIssue = Object.keys(im).map(function (k) { return { label: k, value: im[k] }; })
    .sort(function (a, b) { return b.value - a.value; }).slice(0, 8);

  // Lifetime section (current month + all archives), fetched from the 'stats' endpoint.
  var histHtml;
  if (statsData) {
    var avg = statsData.avgResolutionDays != null
      ? statsData.avgResolutionDays.toFixed(1) + ' days (' + statsData.resolvedCount + ' resolved)' : '—';
    histHtml =
      '<div class="rnote" style="margin-top:20px"><b>Lifetime — all months incl. archives</b> · average resolution time: ' + esc(avg) + '</div>' +
      '<div class="reports">' +
        '<div class="chart-card"><h3>Repeat devices (most tickets)</h3>' + barChart(statsData.byDevice || []) + '</div>' +
        '<div class="chart-card"><h3>Repeat students at fault</h3>' + barChart(statsData.byStudent || []) + '</div>' +
      '</div>';
  } else {
    histHtml = '<div class="rnote" style="margin-top:20px">Loading lifetime history…</div>';
    fetchStats();
  }

  document.getElementById('reportsView').innerHTML =
    '<div class="rnote">Charts below reflect current (non-archived) tickets — ' + tickets.length + ' total. ' +
      'Past months live in their own <b>[Month+YY]_Tickets</b> sheet tabs.</div>' +
    '<div class="reports">' +
      '<div class="chart-card"><h3>By urgency</h3>' + barChart(byUrg) + '</div>' +
      '<div class="chart-card"><h3>By status</h3>' + barChart(byStatus) + '</div>' +
      '<div class="chart-card"><h3>Top issue types</h3>' + barChart(byIssue) + '</div>' +
      '<div class="chart-card"><h3>New tickets · last 14 days</h3>' + dayTrend() + '</div>' +
    '</div>' +
    histHtml +
    '<div class="chart-card" style="margin-top:14px">' +
      '<h3>Archive</h3>' +
      '<div class="rnote">Test the monthly archive: copies current tickets into a new ' +
        '<b>[Month+YY]_Tickets</b> tab. This test does <b>not</b> clear the live sheet.</div>' +
      '<button class="btn" id="testArchiveBtn">⧉ Run test archive (no clear)</button>' +
    '</div>';

  document.getElementById('testArchiveBtn').onclick = testArchive;
}

var statsData = null, statsLoading = false;
function fetchStats() {
  if (statsLoading) return;
  statsLoading = true;
  jsonp({ action: 'stats', token: token }).then(function (res) {
    statsLoading = false;
    if (res && res.ok) { statsData = res; if (activeTab === 'reports') renderReports(); }
  }).catch(function () { statsLoading = false; });
}

function testArchive() {
  var btn = document.getElementById('testArchiveBtn');
  var label = btn.textContent;
  btn.disabled = true; btn.textContent = 'Archiving…';
  jsonp({ action: 'archiveTest', token: token }).then(function (res) {
    btn.disabled = false; btn.textContent = label;
    if (!res || res.ok === false) { toast('Test archive: ' + ((res && res.error) || 'failed')); return; }
    toast('Created tab “' + res.name + '” (' + res.rows + ' rows) — live sheet NOT cleared.');
  }).catch(function (err) {
    btn.disabled = false; btn.textContent = label; toast('Test archive failed: ' + err.message);
  });
}

// filters
['search', 'fStatus', 'fUrgency', 'hideResolved'].forEach(function (id) {
  document.getElementById(id).addEventListener('input', render);
});

// boot
if (token) load(false); else showApp(false);
</script>
